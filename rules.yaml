# 二期数据质检规则配置
# 修改此文件后重新部署即可生效，无需改代码

# 检测策略
# strict: 命中任一关键词即报错
# threshold: 命中N个以上才报错
strategy:
  rule1: strict      # 场景真实性 - 严格
  rule2: threshold   # 附件描述 - 命中2个以上
  rule3: threshold   # 产物要求 - 命中2个以上
  rule4: threshold   # 赘述 - 字数/句子阈值
  rule5: threshold   # 自检 - 有自检词且产物不明确
  rule6: strict      # checklist - 为空即报错
  rule7: strict      # 层级 - 命中即报错

# 阈值配置
thresholds:
  rule2_min_hits: 2        # 附件描述命中几个才报错
  rule3_min_hits: 2        # 产物要求命中几个才报错
  rule4_max_chars: 500     # 题目最大字数
  rule4_max_sentences: 10  # 题目最大句子数
  rule5_output_min_chars: 20  # 产物要求最少字数（低于此算不明确）
  rule6_min_chars: 10      # checklist最少字数

# 规则1：场景真实性 🔴
rule1:
  severity: "🔴"
  critical_keywords:
    - "后台数据"
    - "后台系统"
    - "管理后台"
    - "内部系统"
    - "数据库直接"
    - "直连数据库"
    - "直接查.*数据库"
    - "API\\s*接口"
    - "调用.*接口"
    - "接口.*获取"
    - "接口.*数据"
    - "爬虫.*爬取"
    - "爬取.*数据"
    - "抓取.*数据"
    - "抓取.*信息"
    - "黑入"
    - "破解.*系统"
    - "入侵.*系统"
    - "攻击.*系统"
    - "绕过.*验证"
    - "破解.*密码"
  unreasonable_patterns:
    - "不使用.*搜索.*查"
    - "不用.*APP.*查询"
    - "不通过.*工具.*获取"
    - "不借助.*工具.*查"

# 规则2：精简附件描述 🟡
rule2:
  severity: "🟡"
  patterns:
    - "附件[1-9一二三四五六七八九十]*[（(].*?[.].*?[)）]"
    - "\\.(?:xlsx|xls|csv|docx|doc|pdf|pptx|ppt)\\b"
    - "(?:共|总计|约)\\s*\\d+\\s*(?:行|条|列)"
    - "(?:20\\d{2}年|20\\d{2}[-/])\\d{1,2}月"
    - "[（(].*?(?:包含|共|总计).*?[)）]"
    - "附件.*?(?:内容|数据|信息).*?(?:包括|包含|有)"
    - "附件.*?(?:记录|表格|报告|文档).*?(?:记录|统计|汇总)"

# 规则3：精简产物要求 🟡
rule3:
  severity: "🟡"
  secondary_keywords:
    - "数据来源"
    - "注明.*来源"
    - "标注.*出处"
    - "引用.*来源"
    - "配色"
    - "字体.*(?:大小|颜色|类型|字号)"
    - "行距"
    - "页边距"
    - "字间距"
    - "字数.*(?:不少于|不超过|控制在|限制在)"
    - "\\d+字"
  rigid_patterns:
    - "(?:必须|一定|严格按照).*?格式"
    - "(?:不得|不能|不可以).*?(?:修改|更改|调整)"

# 规则4：题目不赘述 🟢
rule4:
  severity: "🟢"
  # 使用 thresholds 中的 rule4_max_chars 和 rule4_max_sentences

# 规则5：模型自检不强制 🟢
rule5:
  severity: "🟢"
  self_check_keywords:
    - "自检"
    - "自行检查"
    - "检查.*?(?:是否|有没有)"
    - "验证.*?(?:是否|正确性)"
    - "确认.*?(?:是否|正确)"

# 规则6：打分checklist必填 🔴
rule6:
  severity_empty: "🔴"
  severity_short: "🟡"

# 规则7：不写L1-3层级 🟡
rule7:
  severity: "🟡"
  level_patterns:
    - "\\bL[123]\\b"
    - "层级[123一二三]"
    - "任务层级"
    - "任务级别.*[123一二三]"
